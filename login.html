<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
        body{background:#121212;color:#fff}
        .container{max-width:400px;margin:0 auto;padding:40px 20px}
        h1{text-align:center;margin-bottom:10px}
        .desc{text-align:center;color:#999;margin-bottom:30px;font-size:14px}
        .form-group{margin-bottom:20px}
        .form-label{display:block;margin-bottom:8px;font-size:14px;color:#ccc}
        .form-input{
            width:100%;padding:14px 16px;background:#1e1e1e;border:1px solid #333;
            border-radius:10px;color:#fff;font-size:16px;outline:none
        }
        .form-input:focus{border-color:#1677ff}
        .btn{
            width:100%;padding:16px;background:#1677ff;color:#fff;border:none;
            border-radius:14px;font-size:16px;margin-bottom:12px;cursor:pointer
        }
        .back{background:#333}
    </style>
</head>
<body>
<div class="container">
    <h1>用户登录</h1>
    <p class="desc">使用注册的账号密码登录</p>
    <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="username" required>
    </div>
    <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="pwd" required>
    </div>
    <button class="btn" onclick="login()">立即登录</button>
    <button class="btn back" onclick="location.href='register.html'">去注册</button>
</div>
<script>
function login() {
    const user = document.getElementById('username').value.trim();
    const pwd = document.getElementById('pwd').value.trim();
    
    if (!user || !pwd) return alert('请输入用户名和密码！');
    alert(`登录成功！欢迎你，${user}！`);
    // 登录后可跳转到你的业务页面，比如 pay.html
    // location.href = "pay.html";
}
</script>
</body>
</html>
