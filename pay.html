<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>支付页面</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#121212;color:#fff;padding-bottom:60px}
.container{max-width:600px;margin:0 auto;padding:40px 20px}
h1{text-align:center;margin-bottom:30px}
.price-info{text-align:center;font-size:22px;margin-bottom:30px;color:#ff3b30;font-weight:bold}
.pay-group{display:flex;flex-direction:column;gap:15px}
.pay-btn{padding:18px;border:none;border-radius:14px;font-size:16px;font-weight:500;cursor:pointer}
.pay-btn.alipay{background:#1677ff;color:#fff}
.pay-btn.usdt{background:#26a69a;color:#fff}
.back-btn{margin-top:30px;width:100%;padding:16px;background:#333;color:#fff;border:none;border-radius:14px;cursor:pointer}
.usdt-info{background:#1e1e1e;padding:15px;border-radius:12px;margin-top:10px;word-break:break-all;font-size:14px;display:none}

.email-box{margin-top:22px}
.email-box label{display:block;margin-bottom:8px;color:#ccc;font-size:14px}
.email-box input{
    width:100%;padding:14px;background:#1e1e1e;border:1px solid #333;
    border-radius:14px;color:#fff;font-size:16px;outline:none
}

.footer-note{margin-top:20px;font-size:12px;color:#666;text-align:center;line-height:1.6}
</style>
</head>

<body>
<div class="container">
    <h1>确认支付</h1>
    <div class="price-info">金额：¥<span id="price"></span></div>

    <div class="pay-group">
        <button class="pay-btn alipay" id="alipayBtn">支付宝支付</button>
        <button class="pay-btn usdt" onclick="document.getElementById('usdtAddr').style.display='block'">USDT-TRC20 支付</button>
    </div>

    <div id="usdtAddr" class="usdt-info">
        <p>USDT-TRC20 地址：TB6qQqtvmvBUb3GZot4Nt9x4gdiPbuAUXi</p>
        <p>金额：¥<span id="usdtPrice"></span></p>
        <p style="color:#ff4444;margin-top:6px">请务必选择 TRC20 网络</p>
    </div>

    <!-- 邮箱输入框，输完自动记录 -->
    <div class="email-box">
        <label>接收账号信息邮箱</label>
        <input type="email" id="email" placeholder="请输入您的邮箱" onblur="saveEmail()">
    </div>

    <button class="back-btn" onclick="history.back()">返回套餐页</button>

    <div class="footer-note">
        本服务仅用于合法跨境电商运营<br>
        支付后将为您发送账号至邮箱
    </div>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const price = urlParams.get('price');
document.getElementById('price').textContent = price;
document.getElementById('usdtPrice').textContent = price;

const alipayLinks = {
    198: 'https://qr.alipay.com/fkx10657u6sedo8k4c9wu7a',
    298: 'https://qr.alipay.com/fkx1925368sfipa0btliw9f',
    428: 'https://qr.alipay.com/fkx14856lwxhz30uyy0vqbf',
    598: 'https://qr.alipay.com/fkx10456neszxzhwy2ir550'
};

document.getElementById('alipayBtn').onclick = () => {
    window.open(alipayLinks[price]);
};

// 输完邮箱自动保存，你在后台就能看到
function saveEmail() {
    let email = document.getElementById('email').value;
    if (!email) return;
    fetch('save_email.php', {
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded'},
        body: 'email=' + encodeURIComponent(email) + '&price=' + price
    });
}
</script>
</body>
</html>
