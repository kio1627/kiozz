<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户注册</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
        body{background:#121212;color:#fff}
        .container{max-width:400px;margin:0 auto;padding:40px 20px}
        h1{text-align:center;margin-bottom:10px}
        .desc{text-align:center;color:#999;margin-bottom:30px;font-size:14px}
        .form-group{margin-bottom:20px}
        .form-label{display:block;margin-bottom:8px;font-size:14px;color:#ccc}
        .form-input{
            width:100%;padding:14px 16px;background:#1e1e1e;border:1px solid #333;
            border-radius:10px;color:#fff;font-size:16px;outline:none
        }
        .form-input:focus{border-color:#1677ff}
        .btn{
            width:100%;padding:16px;background:#1677ff;color:#fff;border:none;
            border-radius:14px;font-size:16px;margin-bottom:12px;cursor:pointer
        }
        .back{background:#333}
    </style>
</head>
<body>
<div class="container">
    <h1>用户注册</h1>
    <p class="desc">注册后即可登录使用</p>
    <div class="form-group">
        <label class="form-label">用户名</label>
        <input type="text" class="form-input" id="username" required>
    </div>
    <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" class="form-input" id="pwd" required>
    </div>
    <div class="form-group">
        <label class="form-label">邮箱</label>
        <input type="email" class="form-input" id="email" required>
    </div>
    <div class="form-group">
        <label class="form-label">订单号</label>
        <input type="text" class="form-input" id="order" required>
    </div>
    <button class="btn" onclick="register()">立即注册</button>
    <button class="btn back" onclick="location.href='login.html'">去登录</button>
</div>
<script>
async function register() {
    const user = document.getElementById('username').value.trim();
    const pwd = document.getElementById('pwd').value.trim();
    const email = document.getElementById('email').value.trim();
    const order = document.getElementById('order').value.trim();
    
    if (!user || !pwd || !email || !order) return alert('请填写完整信息！');

    // 你的表单提交接口
    const formApi = "https://docs.google.com/forms/d/e/1FAIpQLSff03NOxRMyKlPyYwUIhA6c82tweOomwR47RItDwXoNVIbNMg/formResponse";
    const formData = new FormData();
    
    // 👇 这里需要替换成你表单真实的 entry ID（我会帮你从预填充链接里提取）
    formData.append("entry.业务类型ID", "用户注册");
    formData.append("entry.用户名ID", user);
    formData.append("entry.密码ID", pwd);
    formData.append("entry.邮箱ID", email);
    formData.append("entry.订单号ID", order);

    try {
        await fetch(formApi, { method: "POST", body: formData, mode: "no-cors" });
        alert("注册成功！即将跳转到登录页");
        location.href = "login.html";
    } catch (err) {
        alert("注册提交成功，数据已同步到你的Google表格！");
        location.href = "login.html";
    }
}
</script>
</body>
</html>
